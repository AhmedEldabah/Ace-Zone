<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Zone - Animated Padel Match</title>
    <link rel="stylesheet" href="rally.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <a href="index.html" style="color:inherit;text-decoration:none;"><h1>ACE <span>ZONE</span></h1></a>
        </div>
        <div class="scoreboard">
            RALLY: <span id="rallyCount">0</span> &nbsp;|&nbsp; MAX: <span id="maxRally">0</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="matchCanvas" width="850" height="480"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="speedSlider">Game Speed</label>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label for="intensitySlider">Rally Intensity</label>
            <input type="range" id="intensitySlider" min="8" max="16" step="1" value="12">
        </div>
        <button class="btn" id="resetBtn">Reset Rally</button>
    </div>

    <div style="margin-top:20px;text-align:center;">
        <a href="index.html" class="btn" style="display:inline-flex;text-decoration:none;">&larr; Back to Ace Zone</a>
    </div>
</div>

<script src="rally.js"></script>
</body>
</html>
