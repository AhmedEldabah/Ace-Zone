<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Ace Zone logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B8EE6"/>
      <stop offset="1" stop-color="#0D5FA8"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="38" fill="url(#bg)"/>

  <!-- subtle inner ring -->
  <rect x="6" y="6" width="188" height="188" rx="32" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2"/>

  <!-- padel racket (yellow + white) -->
  <g transform="translate(132 72) rotate(28)">
    <ellipse cx="0" cy="0" rx="34" ry="40" fill="#FFE000" stroke="#0A0B0C" stroke-width="3"/>
    <g fill="#FFFFFF">
      <circle cx="-12" cy="-12" r="3"/><circle cx="0" cy="-12" r="3"/><circle cx="12" cy="-12" r="3"/>
      <circle cx="-12" cy="0"   r="3"/><circle cx="0" cy="0"   r="3"/><circle cx="12" cy="0"   r="3"/>
      <circle cx="-12" cy="12"  r="3"/><circle cx="0" cy="12"  r="3"/><circle cx="12" cy="12"  r="3"/>
    </g>
    <rect x="-5" y="38" width="10" height="34" rx="2" fill="#FFFFFF" stroke="#0A0B0C" stroke-width="2"/>
  </g>

  <!-- "Ace" wordmark in yellow with subtle italic lean -->
  <g transform="translate(28 132)">
    <text x="0" y="0"
          font-family="Anton, Impact, sans-serif"
          font-size="84"
          font-style="italic"
          fill="#FFE000"
          stroke="#0A0B0C"
          stroke-width="3"
          stroke-linejoin="round"
          paint-order="stroke fill">Ace</text>
  </g>

  <!-- "zone" wordmark in white below "Ace" -->
  <g transform="translate(36 168)">
    <text x="0" y="0"
          font-family="Anton, Impact, sans-serif"
          font-size="26"
          letter-spacing="6"
          fill="#FFFFFF">ZONE</text>
  </g>
</svg>
